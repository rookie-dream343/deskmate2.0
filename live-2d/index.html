<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <title>Live2D桌宠与语音聊天</title>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="subtitle-container">
        <p id="subtitle-text"></p>
    </div>

    <div id="text-chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <div id="chat-input" contenteditable="true" placeholder="输入消息..."></div>
            <div id="chat-send-btn">发送</div>
        </div>
    </div>

    <!-- 歌词气泡容器 -->
    <div id="lyrics-bubble-container">
        <div id="lyrics-bubble-text"></div>
    </div>

    <!-- 气泡框容器 -->
    <div id="bubble-container">
        <div id="bubble-text"></div>
    </div>

    <!-- 工具调用气泡框堆叠容器 -->
    <div id="tool-bubbles-container"></div>

    <!-- 对话历史记录容器 -->
    <div id="history-container">
        <div id="history-toggle-btn" class="active">
            <span id="history-icon">💬</span>
        </div>
        <div id="history-content">
            <div id="history-header">
                <span id="history-title">对话记录</span>
                <span id="history-clear-btn" title="清空记录">🗑️</span>
            </div>
            <div id="history-messages"></div>
        </div>
    </div>

    <!-- 调试脚本 -->
    <script>
        // 等待DOM加载完成后绑定事件
        window.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('history-toggle-btn');
            const content = document.getElementById('history-content');
            let isVisible = true;  // 默认显示

            if (btn && content) {
                // 移除旧的监听器（如果有）
                btn.onclick = null;

                btn.addEventListener('click', function(e) {
                    console.log('[History] 按钮被点击, 当前:', isVisible);
                    e.preventDefault();
                    e.stopPropagation();

                    isVisible = !isVisible;
                    if (isVisible) {
                        content.style.display = 'flex';
                        btn.classList.add('active');
                    } else {
                        content.style.display = 'none';
                        btn.classList.remove('active');
                    }
                });
            }
        });
    </script>

    <!-- 引入 Live2D 依赖 -->
    <script src="libs/live2d.min.js"></script>
    <script src="libs/live2dcubismcore.min.js"></script>
    <script src="libs/pixi.min.js"></script>
    <script src="libs/pixi-live2d-display.min.js"></script>
    <script src="libs/pixi-live2d-display-extra.min.js"></script>
    <script src="app.js"></script>

</body>

</html>
